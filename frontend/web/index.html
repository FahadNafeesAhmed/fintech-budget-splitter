<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Coin Catcher">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Coin Catcher — DartStream</title>
  <link rel="manifest" href="manifest.json">

  <!-- Firebase Web SDK init for Analytics on the hosted site.
       Per the dartstream_client README, we load the public Firebase
       config from /__/firebase/init.json (auto-served by Firebase
       Hosting) instead of committing it. Falls through silently when
       the JSON isn't reachable (local dev). -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-analytics.js";

    try {
      const resp = await fetch("/__/firebase/init.json");
      if (resp.ok) {
        const config = await resp.json();
        const app = initializeApp(config);
        getAnalytics(app);
      }
    } catch (_) {
      // /__/firebase/init.json is only served on Firebase Hosting.
      // Skipping analytics is fine locally.
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  bin-cli-analyze:
    name: Analyze bin/ smoke + deep-dive CLIs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart analyze bin

  frontend:
    name: Flutter web — analyze + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Pinned for exact reproducibility — matches the verified local
          # toolchain (Flutter 3.44.2 / Dart 3.12). Bump deliberately.
          flutter-version: 3.44.2
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      # The Firebase web API key is normally injected via --dart-define at
      # run/build time. CI doesn't need a real key (the build only embeds
      # the string), so we pass an obvious placeholder.
      - run: flutter build web --release --dart-define=FIREBASE_API_KEY=ci-placeholder

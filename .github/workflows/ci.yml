name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  bin-cli-analyze:
    name: Analyze bin/ smoke + deep-dive CLIs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart analyze bin

  shared-models:
    name: shared_models — analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/shared_models
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart analyze
      # Tests for shared_models' BudgetCalculator live under frontend/test
      # and run in the frontend job below — no test/ dir to invoke here.

  frontend:
    name: Flutter web — analyze + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # Sample-app deprecations (withOpacity → withValues, etc.) shouldn't
      # block CI — they're cosmetic on the Flutter stable channel and the
      # app still runs. Real errors keep failing the step.
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test
      # The Firebase web API key is normally injected via --dart-define at
      # run/build time. CI doesn't need a real key (the build only embeds
      # the string), so we pass an obvious placeholder.
      - run: flutter build web --release --dart-define=FIREBASE_API_KEY=ci-placeholder

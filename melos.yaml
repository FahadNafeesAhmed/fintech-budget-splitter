name: coin_catcher
repository: https://github.com/FahadNafeesAhmed/fintech-budget-splitter

packages:
  - frontend

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  test:
    run: melos exec --dir-exists=test -- flutter test
    description: Run all tests across every package

  analyze:
    run: melos exec -- dart analyze .
    description: Run static analysis on all packages
